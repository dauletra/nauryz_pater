# /etc/nginx/conf.d/otbasy-rate-limit.conf
# Rate-limiting zones (http context — loaded before server blocks)

# Webhook: 10 req/sec per IP, burst 20 (Telegram sends 1 at a time, limit against abuse)
limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/s;

# Health: 2 req/sec per IP (monitoring probes)
limit_req_zone $binary_remote_addr zone=health:1m  rate=2r/s;
